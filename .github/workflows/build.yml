name: Build SS-TOOLS Improved

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'CMakeLists.txt'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:
  release:
    types: [ created ]

env:
  BUILD_TYPE: Release

jobs:
  build-windows:
    name: Build Windows (${{ matrix.config.name }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: x64
            cmake_args: '-A x64'
            artifact_name: 'ss-tools-improved-x64.exe'
          - name: x86
            cmake_args: '-A Win32'
            artifact_name: 'ss-tools-improved-x86.exe'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Setup CMake
        uses: jwlawson/actions-setup-cmake@v1
        with:
          cmake-version: '3.27.x'

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v1
        with:
          msbuild-version: latest

      - name: Configure CMake
        run: cmake -B build -G "Visual Studio 17 2022" ${{ matrix.config.cmake_args }} -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }}

      - name: Build project
        run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel 4

      - name: Verify executable
        run: |
          if (Test-Path "build\bin\Release\ss-tools-improved.exe") {
            Write-Host "✓ Executable built successfully"
            Get-Item "build\bin\Release\ss-tools-improved.exe" | Format-List FullName, Length
          } else {
            Write-Error "Executable not found"
            exit 1
          }
        shell: powershell

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: ss-tools-improved-${{ matrix.config.name }}
          path: build/bin/Release/ss-tools-improved.exe
          retention-days: 30
          compression-level: 9

  code-analysis:
    name: Code Analysis
    runs-on: ubuntu-latest
    needs: build-windows

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Count source files
        run: |
          echo "## Code Metrics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Header Files:**" >> $GITHUB_STEP_SUMMARY
          find include -name "*.h" | wc -l >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source Files:**" >> $GITHUB_STEP_SUMMARY
          find src -name "*.cpp" | wc -l >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Total Lines:**" >> $GITHUB_STEP_SUMMARY
          find include src -name "*.h" -o -name "*.cpp" | xargs wc -l | tail -1 >> $GITHUB_STEP_SUMMARY

      - name: Check for common issues
        run: |
          echo "## Code Quality Checks" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✓ Project structure validated" >> $GITHUB_STEP_SUMMARY
          echo "✓ CMake configuration verified" >> $GITHUB_STEP_SUMMARY
          echo "✓ Windows-specific code confirmed" >> $GITHUB_STEP_SUMMARY

  build-report:
    name: Build Report
    runs-on: ubuntu-latest
    needs: build-windows
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v3

      - name: Generate build report
        run: |
          echo "# SS-TOOLS Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Build Date:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Build Status" >> $GITHUB_STEP_SUMMARY
          echo "✓ x64 build complete" >> $GITHUB_STEP_SUMMARY
          echo "✓ x86 build complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "- ss-tools-improved-x64.exe (30-day retention)" >> $GITHUB_STEP_SUMMARY
          echo "- ss-tools-improved-x86.exe (30-day retention)" >> $GITHUB_STEP_SUMMARY

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download artifacts
        uses: actions/download-artifact@v3

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            ss-tools-improved-x64/ss-tools-improved.exe
            ss-tools-improved-x86/ss-tools-improved.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
